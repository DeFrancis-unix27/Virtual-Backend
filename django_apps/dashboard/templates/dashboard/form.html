{% extends "dashboard/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="mb-4">
  <h3 class="mb-0" style="font-weight: 700;">{{ title }}</h3>
</div>
<div class="dashboard-card" style="max-width: 700px;">
  <form method="POST">
    {% csrf_token %}
    {% for field in fields %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {% if field.type == "textarea" %}
      <textarea name="{{ field.name }}" class="form-control" rows="4">{{ field.value }}</textarea>
      {% else %}
      <input type="{{ field.type }}" name="{{ field.name }}" class="form-control" value="{{ field.value }}">
      {% endif %}
    </div>
    {% endfor %}
    <div class="mt-4">
      <button type="submit" class="btn btn-accent">Save Changes</button>
      <a href="{% url 'dashboard-home' %}" class="btn btn-outline-accent ms-2">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
